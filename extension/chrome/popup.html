<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f15; color: #e0e0e0; padding: 16px; }
    h1 { font-size: 18px; color: #f0c040; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .status { font-size: 12px; color: #888; margin-bottom: 16px; }
    .media-list { max-height: 300px; overflow-y: auto; }
    .media-item { background: #1a1a24; border: 1px solid #2a2a35; border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s; }
    .media-item:hover { border-color: #f0c040; }
    .media-item .url { font-size: 11px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .media-item .meta { font-size: 10px; color: #666; margin-top: 4px; }
    .btn { width: 100%; padding: 10px; background: #f0c040; color: #0f0f15; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn:hover { opacity: 0.9; }
    .empty { text-align: center; padding: 30px; color: #555; font-size: 13px; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>⚡ VoltDown</h1>
  <div class="status" id="status">Checking page...</div>

  <div class="toggle-row">
    <label>Intercept browser downloads</label>
    <input type="checkbox" id="intercept" checked>
  </div>

  <ul class="media-list" id="queue">
    <li class="empty">Scanning for media...</li>
  </ul>

  <button class="btn" id="openApp">Open Dashboard</button>

  <script src="popup.js"></script>
</body>
</html>
